<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Jardines y Espacios Públicos - Rosario</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
<style>
  :root{
    --govuk-blue:#1d70b8;
    --govuk-dark-blue:#003078;
    --govuk-black:#0b0c0c;
    --govuk-white:#ffffff;
    --govuk-grey:#f3f2f1;
    --govuk-mid-grey:#b1b4b6;
    --govuk-green:#00703c;
    --govuk-yellow:#ffdd00;
    --govuk-red:#d4351c;
    --govuk-purple:#4c2c92;
    --font: "GDS Transport", "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family: var(--font);
    background: var(--govuk-grey);
    color: var(--govuk-black);
  }
  #app{
    display:flex;
    height:100vh;
    width:100vw;
  }
  header.topbar{
    position:fixed;
    top:0; left:0; right:0;
    height:48px;
    background: var(--govuk-black);
    color:#fff;
    display:flex;
    align-items:center;
    padding:0 16px;
    z-index:1000;
    font-weight:700;
    font-size:16px;
    letter-spacing:.5px;
  }
  header.topbar .crown{
    width:24px;height:24px;margin-right:10px;
    background: var(--govuk-yellow);
    border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    color:#000;font-size:14px;font-weight:900;
  }
  #map-wrap{
    flex:1 1 auto;
    margin-top:48px;
    height:calc(100vh - 48px);
    position:relative;
  }
  #map{ width:100%; height:100%; }

  #sidebar{
    width:380px;
    max-width:38vw;
    margin-top:48px;
    height:calc(100vh - 48px);
    background: var(--govuk-white);
    border-left: 4px solid var(--govuk-blue);
    overflow-y:auto;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
  }
  .panel-header{
    background: var(--govuk-blue);
    color:#fff;
    padding:16px;
    font-size:19px;
    font-weight:700;
  }
  .panel-header small{
    display:block;
    font-weight:400;
    font-size:14px;
    margin-top:4px;
    opacity:.9;
  }
  .panel-body{
    padding:16px;
    flex:1;
  }
  .empty-state{
    color:#505a5f;
    font-size:16px;
    line-height:1.5;
    padding-top:8px;
  }
  .empty-state .badge{
    display:inline-block;
    background: var(--govuk-yellow);
    color:#000;
    padding:2px 8px;
    font-size:12px;
    font-weight:700;
    margin-bottom:10px;
  }
  .place-title{
    font-size:24px;
    font-weight:700;
    color: var(--govuk-black);
    margin:0 0 6px 0;
    border-bottom: 2px solid var(--govuk-black);
    padding-bottom:10px;
  }
  .photo-wrap{
    width:100%;
    margin:14px 0;
    border:1px solid var(--govuk-mid-grey);
    background:#fff;
    overflow:hidden;
  }
  .photo-wrap img{
    width:100%;
    height:auto;
    max-height:260px;
    object-fit:cover;
    display:block;
  }
  .photo-caption{
    font-size:11px;
    color:#505a5f;
    background: var(--govuk-grey);
    padding:4px 8px;
    border-top:1px solid var(--govuk-mid-grey);
  }
  .photo-placeholder{
    width:100%;
    height:140px;
    margin:14px 0;
    background: var(--govuk-grey);
    border:1px dashed var(--govuk-mid-grey);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#505a5f;
    font-size:14px;
  }
  .place-tag{
    display:inline-block;
    background: var(--govuk-green);
    color:#fff;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    padding:3px 8px;
    margin:10px 0;
  }
  .field-row{
    display:flex;
    border-bottom:1px solid var(--govuk-mid-grey);
    padding:10px 0;
    font-size:15px;
  }
  .field-label{
    flex:0 0 110px;
    font-weight:700;
    color:#505a5f;
  }
  .field-value{
    flex:1;
    word-break:break-word;
  }
  .field-value a{ color: var(--govuk-blue); }
  .close-btn{
    background:none;
    border:1px solid #fff;
    color:#fff;
    float:right;
    cursor:pointer;
    padding:4px 10px;
    font-size:13px;
    font-weight:700;
  }
  .close-btn:hover{ background: rgba(255,255,255,.15); }

  .leaflet-popup-content-wrapper{
    border-radius:0;
    border-left:4px solid var(--govuk-blue);
  }
  .leaflet-popup-content{ font-family: var(--font); font-size:14px; }

  .govuk-pin{
    width:32px; height:42px;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .govuk-pin svg{ width:32px; height:42px; display:block; }

  .loading-bar{
    position:absolute;
    top:0; left:0; right:0;
    height:4px;
    background: var(--govuk-yellow);
    z-index:1001;
    animation: pulse 1s infinite ease-in-out;
  }
  @keyframes pulse{ 0%{opacity:1;} 50%{opacity:.3;} 100%{opacity:1;} }

  .status-msg{
    padding:16px;
    font-size:15px;
    color:#505a5f;
  }
  .status-msg.error{ color: var(--govuk-red); font-weight:700; }

  .count-badge{
    position:absolute;
    bottom:16px; left:16px;
    background:#fff;
    border:2px solid var(--govuk-black);
    padding:8px 14px;
    font-size:14px;
    font-weight:700;
    z-index:500;
    box-shadow:2px 2px 0 var(--govuk-black);
  }

  /* mobile */
  @media (max-width: 768px){
    #app{ flex-direction:column; }
    #map-wrap{
      flex: 1 1 55%;
      height:55vh;
      width:100%;
    }
    #sidebar{
      width:100%;
      max-width:100%;
      flex: 1 1 45%;
      height:45vh;
      border-left:none;
      border-top:4px solid var(--govuk-blue);
    }
    .place-title{ font-size:20px; }
  }
</style>
</head>
<body>

<header class="topbar"><span class="crown">i</span>Lugares Públicos y Jardines · Rosario</header>

<div id="app">
  <div id="map-wrap">
    <div id="map"></div>
    <div class="count-badge" id="countBadge">Cargando…</div>
  </div>
  <div id="sidebar">
    <div class="panel-header">
      Información del lugar
      <small>Tocá un marcador en el mapa para ver los detalles</small>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="empty-state">
        <span class="badge">SIN SELECCIÓN</span>
        <p>Seleccioná un punto del mapa para ver su información detallada acá.</p>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = "https://ws.rosario.gob.ar/ubicaciones/public/geojson/lugaresConEtiquetas?termino=all&extendido=true&incluyeEtiquetas=false&habilitaBusquedaPorId=false&titular=0&etiquetas=jardines,p%C3%BAblicos&operadorEtiquetas=AND";

// EPSG:22185 - Campo Inchauspe / Argentina 5 (Gauss-Krüger Faja 5)
proj4.defs("EPSG:22185", "+proj=tmerc +lat_0=-90 +lon_0=-60 +k=1 +x_0=5500000 +y_0=0 +ellps=intl +towgs84=-148,136,90,0,0,0,0 +units=m +no_defs");

function toLatLon(x, y){
  // proj4 espera [x, y] en el sistema de origen, devuelve [lon, lat] en WGS84
  const [lon, lat] = proj4("EPSG:22185", "WGS84", [x, y]);
  return [lat, lon];
}

const map = L.map('map', { zoomControl: true }).setView([-32.9468, -60.6393], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// GOV.UK style pin icon (location marker, blue, with white center dot)
function govukPinIcon(color){
  const svg = `
  <svg viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 0C7.2 0 0 7.2 0 16c0 11 16 26 16 26s16-15 16-26C32 7.2 24.8 0 16 0z" fill="${color}" stroke="#0b0c0c" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="6.5" fill="#ffffff" stroke="#0b0c0c" stroke-width="1.2"/>
  </svg>`;
  return L.divIcon({
    html: `<div class="govuk-pin">${svg}</div>`,
    className: '',
    iconSize: [32, 42],
    iconAnchor: [16, 42],
    popupAnchor: [0, -38]
  });
}

const defaultIcon = govukPinIcon('#1d70b8');
const selectedIcon = govukPinIcon('#d4351c');

let markersLayer = L.layerGroup().addTo(map);
let allMarkers = [];
let currentSelected = null;

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function buildFieldRows(props){
  const skip = ['nombre','descripcion','direccion'];
  let rows = '';
  for(const key in props){
    if(skip.includes(key)) continue;
    const val = props[key];
    if(val === null || val === undefined || val === '') continue;
    if(typeof val === 'object') continue;
    let label = key.replace(/_/g,' ');
    label = label.charAt(0).toUpperCase() + label.slice(1);
    let value = escapeHtml(val);
    if(/^https?:\/\//i.test(String(val))){
      value = `<a href="${value}" target="_blank" rel="noopener">${value}</a>`;
    }
    rows += `<div class="field-row"><div class="field-label">${escapeHtml(label)}</div><div class="field-value">${value}</div></div>`;
  }
  return rows;
}

function slugify(str){
  return String(str).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

function findPhotoUrl(props){
  // Intenta detectar el campo de foto/imagen entre las propiedades, sea string única o array
  const candidateKeys = ['foto','fotos','imagen','imagenes','imagenUrl','imagen_url','foto_url','image','images','photo','photos','urlImagen','url_imagen'];
  for(const key of candidateKeys){
    if(props[key] === undefined || props[key] === null) continue;
    let val = props[key];
    if(Array.isArray(val) && val.length > 0) val = val[0];
    if(typeof val === 'object' && val !== null){
      val = val.url || val.src || val.path || null;
    }
    if(typeof val === 'string' && val.trim() !== ''){
      if(/^https?:\/\//i.test(val)) return val;
      if(val.startsWith('/')) return 'https://ws.rosario.gob.ar' + val;
      return val;
    }
  }
  return null;
}

function exampleImageUrl(nombre){
  // Imagen de ejemplo determinística por lugar (placeholder, no es una foto real del sitio)
  const seed = slugify(nombre) || 'lugar';
  return `https://picsum.photos/seed/${encodeURIComponent(seed)}/480/300`;
}

function showPlaceInfo(props, marker){
  if(currentSelected) currentSelected.setIcon(defaultIcon);
  marker.setIcon(selectedIcon);
  currentSelected = marker;

  const nombre = props.nombre || props.NOMBRE || props.titulo || 'Lugar sin nombre';
  const direccion = props.direccion || props.DIRECCION || '';
  const descripcion = props.descripcion || props.DESCRIPCION || '';
  const fotoUrl = findPhotoUrl(props);
  const isRealPhoto = !!fotoUrl;
  const displayUrl = fotoUrl || exampleImageUrl(nombre);

  let html = `<h2 class="place-title">${escapeHtml(nombre)}</h2>`;

  html += `
    <div class="photo-wrap">
      <img src="${escapeHtml(displayUrl)}" alt="${escapeHtml(nombre)}"
           onerror="this.closest('.photo-wrap').remove();" />
      ${!isRealPhoto ? '<div class="photo-caption">Imagen de ejemplo (ilustrativa, no es una foto real del lugar)</div>' : ''}
    </div>`;

  html += `<span class="place-tag">Espacio público / Jardín</span>`;

  if(direccion){
    html += `<div class="field-row"><div class="field-label">Dirección</div><div class="field-value">${escapeHtml(direccion)}</div></div>`;
  }
  if(descripcion){
    html += `<div class="field-row"><div class="field-label">Descripción</div><div class="field-value">${escapeHtml(descripcion)}</div></div>`;
  }
  html += buildFieldRows(props);

  document.getElementById('panelBody').innerHTML = html;

  // On mobile, scroll sidebar into view
  if(window.innerWidth <= 768){
    document.getElementById('sidebar').scrollIntoView({behavior:'smooth'});
  }
}

async function fetchWithFallback(url){
  const attempts = [];

  // 1. Intento directo
  try{
    const res = await fetch(url);
    if(res.ok) return await res.json();
    attempts.push('Directo: HTTP ' + res.status);
  }catch(e){
    attempts.push('Directo: ' + e.message);
  }

  // 2. allorigins (raw)
  try{
    const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
    if(res.ok) return await res.json();
    attempts.push('allorigins: HTTP ' + res.status);
  }catch(e){
    attempts.push('allorigins: ' + e.message);
  }

  // 3. corsproxy.io
  try{
    const res = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(url));
    if(res.ok) return await res.json();
    attempts.push('corsproxy.io: HTTP ' + res.status);
  }catch(e){
    attempts.push('corsproxy.io: ' + e.message);
  }

  // 4. allorigins (get, JSON-wrapped)
  try{
    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    if(res.ok){
      const wrapped = await res.json();
      if(wrapped && wrapped.contents) return JSON.parse(wrapped.contents);
    }
    attempts.push('allorigins/get: HTTP ' + res.status);
  }catch(e){
    attempts.push('allorigins/get: ' + e.message);
  }

  throw new Error(attempts.join(' | '));
}

async function loadData(){
  try{
    const geojson = await fetchWithFallback(DATA_URL);

    const features = geojson.features || [];
    document.getElementById('countBadge').textContent = features.length + ' lugares encontrados';

    if(features.length === 0){
      document.getElementById('countBadge').textContent = 'Sin resultados';
      return;
    }

    const bounds = [];

    features.forEach(f => {
      if(!f.geometry || f.geometry.type !== 'Point') return;
      const [x, y] = f.geometry.coordinates;

      // Si los valores son grandes (proyectados, no grados), convertir desde EPSG:22185
      let lat, lon;
      if(Math.abs(x) > 180 || Math.abs(y) > 180){
        [lat, lon] = toLatLon(x, y);
      }else{
        // ya viene en grados (lon, lat) estilo GeoJSON estándar
        lon = x; lat = y;
      }

      const props = f.properties || {};
      const nombre = props.nombre || props.NOMBRE || props.titulo || 'Lugar sin nombre';

      const marker = L.marker([lat, lon], { icon: defaultIcon });
      marker.bindPopup(`<strong>${escapeHtml(nombre)}</strong><br><span style="color:#505a5f;">Tocá para ver más info →</span>`);
      marker.on('click', () => showPlaceInfo(props, marker));
      marker.addTo(markersLayer);
      allMarkers.push(marker);
      bounds.push([lat, lon]);
    });

    if(bounds.length){
      map.fitBounds(bounds, { padding: [30, 30] });
    }

  }catch(err){
    console.error(err);
    document.getElementById('countBadge').textContent = 'Error al cargar';
    document.getElementById('panelBody').innerHTML = `
      <div class="status-msg error">
        No se pudieron cargar los datos del mapa.<br><br>
        Esto puede deberse a restricciones CORS del servidor de la API
        (ws.rosario.gob.ar) cuando se accede desde el navegador.<br><br>
        Detalle técnico: ${escapeHtml(err.message)}
      </div>`;
  }
}

loadData();
</script>

</body>
</html>
