<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jardines y Espacios Públicos · Rosario</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1b2a;
  --blue:#1d70b8;
  --blue-light:#4a9fd4;
  --green:#00703c;
  --yellow:#ffdd00;
  --white:#fff;
  --grey:#f3f2f1;
  --mid:#b1b4b6;
  --red:#d4351c;
  --panel-w:40%;
  --font:'Helvetica Neue',Arial,sans-serif;
  /* tema claro */
  --panel-bg:rgba(255,255,255,0.82);
  --panel-text:#0b0c0c;
  --panel-sub:#505a5f;
  --panel-border:rgba(29,112,184,0.35);
  --field-border:rgba(0,0,0,0.08);
}
html,body{height:100%;font-family:var(--font);background:#e8edf2;color:var(--panel-text);overflow:hidden;}

/* ── TITLE SLIDE ─────────────────────────────── */
#title-slide{
  position:fixed;inset:0;z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#e8edf2;
  transition:opacity .6s ease, visibility .6s ease;
}
#title-slide.hidden{opacity:0;visibility:hidden;}
#title-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=1200&fit=crop&auto=format') center/cover;
  opacity:.12;
}
#title-content{
  position:relative;z-index:1;text-align:center;padding:32px;max-width:680px;
}
#title-content .pre-title{
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:var(--blue);margin-bottom:16px;font-weight:700;
}
#title-content h1{
  font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.1;
  margin-bottom:16px;color:var(--panel-text);
}
#title-content p{
  font-size:16px;color:var(--panel-sub);line-height:1.6;margin-bottom:32px;
}
#btn-start{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--blue);color:#fff;border:none;
  padding:14px 28px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:var(--font);letter-spacing:.5px;
  transition:background .2s;
}
#btn-start:hover{background:var(--blue-light);}
#btn-start:disabled{background:var(--mid);cursor:not-allowed;}
#btn-start svg{width:18px;height:18px;fill:currentColor;}
#loading-msg{margin-top:20px;font-size:13px;color:var(--panel-sub);}

/* ── MAIN LAYOUT ─────────────────────────────── */
#app{position:fixed;inset:0;display:flex;opacity:0;transition:opacity .5s ease;}
#app.visible{opacity:1;}

/* ── PANEL ───────────────────────────────────── */
#panel{
  width:var(--panel-w);min-width:320px;
  height:100%;
  background:var(--panel-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  display:flex;flex-direction:column;
  position:relative;z-index:10;
  /* borde derecho difuso: sombra difuminada + pseudo-gradiente */
  box-shadow: 6px 0 32px rgba(0,0,0,0.12);
}
/* borde difuso entre panel y mapa: gradiente de blanco a transparente */
#panel::after{
  content:'';
  position:absolute;
  top:0;right:-32px;bottom:0;
  width:32px;
  background:linear-gradient(to right, rgba(255,255,255,0.55), transparent);
  pointer-events:none;
  z-index:1;
}

/* hero image */
#slide-hero{
  flex-shrink:0;
  height:240px;
  overflow:hidden;
  position:relative;
  background:rgba(0,0,0,.06);
}
#slide-hero img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity .3s;
}
#slide-hero .hero-caption{
  position:absolute;bottom:0;left:0;right:0;
  padding:6px 12px;font-size:10px;color:rgba(255,255,255,.75);
  background:linear-gradient(transparent,rgba(0,0,0,.4));
}
#slide-hero .hero-num{
  position:absolute;top:12px;left:12px;
  background:var(--blue);color:#fff;
  font-size:11px;font-weight:700;padding:4px 8px;letter-spacing:1px;
}

/* text body */
#slide-body{
  flex:1;overflow-y:auto;padding:20px 24px;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent;
}
#slide-body::-webkit-scrollbar{width:4px;}
#slide-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}

.s-label{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--blue);font-weight:700;margin-bottom:8px;
}
.s-title{
  font-size:22px;font-weight:800;line-height:1.2;
  color:var(--panel-text);margin-bottom:14px;
}
.s-tag{
  display:inline-block;background:var(--green);color:#fff;
  font-size:10px;font-weight:700;text-transform:uppercase;
  padding:3px 8px;margin-bottom:14px;letter-spacing:.5px;
}
.s-field{
  display:flex;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--field-border);
  font-size:13px;
}
.s-field-label{flex:0 0 90px;color:var(--panel-sub);font-weight:600;}
.s-field-value{flex:1;color:var(--panel-text);word-break:break-word;}
.s-field-value a{color:var(--blue);}

/* slide transition */
.slide-inner{animation:fadeSlideIn .32s cubic-bezier(.4,0,.2,1) both;}
.slide-inner.from-right{animation-name:fromRight;}
.slide-inner.from-left{animation-name:fromLeft;}
@keyframes fromRight{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:none;}}
@keyframes fromLeft{from{opacity:0;transform:translateX(-24px);}to{opacity:1;transform:none;}}

/* ── NAV BAR ─────────────────────────────────── */
#nav-bar{
  flex-shrink:0;
  border-top:1px solid rgba(0,0,0,.08);
  background:rgba(255,255,255,.6);
  padding:10px 16px;
  display:flex;align-items:center;gap:12px;
}
.nav-arrow{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(0,0,0,.15);
  background:rgba(255,255,255,.8);
  color:var(--panel-text);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:background .15s,border-color .15s,color .15s;
  font-family:Arial,sans-serif;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}
.nav-arrow:hover:not(:disabled){background:var(--blue);border-color:var(--blue);color:#fff;}
.nav-arrow:disabled{opacity:.28;cursor:not-allowed;}
#nav-counter{
  flex:1;text-align:center;
  font-size:12px;font-weight:600;color:var(--panel-sub);letter-spacing:.5px;
}
#nav-counter strong{color:var(--panel-text);font-size:15px;}

/* timeline dots strip at bottom of map */
#timeline{
  position:absolute;bottom:0;left:0;right:0;z-index:500;
  background:linear-gradient(transparent,rgba(232,237,242,.85) 60%);
  padding:28px 16px 12px;
  display:flex;align-items:center;gap:0;overflow-x:auto;
  scrollbar-width:none;
}
#timeline::-webkit-scrollbar{display:none;}
.tl-line{flex:1;height:2px;background:rgba(29,112,184,.25);min-width:8px;max-width:32px;}
.tl-dot{
  flex-shrink:0;width:12px;height:12px;border-radius:50%;
  background:rgba(29,112,184,.3);border:2px solid rgba(29,112,184,.5);
  cursor:pointer;transition:transform .15s,background .15s,border-color .15s;
}
.tl-dot:hover{transform:scale(1.4);background:var(--blue);}
.tl-dot.active{
  background:var(--blue);border-color:var(--blue);
  transform:scale(1.5);box-shadow:0 0 8px rgba(29,112,184,.5);
}

/* leaflet tweaks */
.leaflet-popup-content-wrapper{border-radius:0;border-left:4px solid var(--blue);background:rgba(255,255,255,.95);color:var(--panel-text);}
.leaflet-popup-content{font-family:var(--font);font-size:13px;color:var(--panel-text);}
.leaflet-popup-tip{background:rgba(255,255,255,.95);}

/* ── MAP ─────────────────────────────────────── */
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* ── MOBILE ──────────────────────────────────── */
@media(max-width:768px){
  #app{flex-direction:row;}

  #map-wrap{
    position:absolute;inset:0;width:100%;height:100%;z-index:1;
  }

  #panel{
    position:absolute;
    bottom:0;left:0;right:0;
    width:100%;min-width:0;
    height:54vh;
    z-index:1000;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    border-radius:16px 16px 0 0;
    border-top:3px solid var(--blue);
    border-right:none;
    box-shadow:0 -4px 32px rgba(0,0,0,.15);
  }
  /* borde difuso hacia arriba en mobile */
  #panel::after{
    top:-32px;right:0;left:0;bottom:auto;
    width:auto;height:32px;
    background:linear-gradient(to top, rgba(255,255,255,0.55), transparent);
  }
  #panel.open{transform:translateY(0);}
  #slide-hero{height:150px;}
  #slide-body{padding:10px 16px;}
  .s-title{font-size:17px;}
  #nav-bar{padding:8px 12px;gap:8px;background:rgba(255,255,255,.7);}
  .nav-arrow{width:36px;height:36px;font-size:16px;}
  #timeline{padding:20px 12px 8px;}

  #panel::before{
    content:'';display:block;width:36px;height:4px;border-radius:2px;
    background:rgba(0,0,0,.15);margin:10px auto 0;flex-shrink:0;
  }
}
</style>
</head>
<body>

<!-- TITLE SLIDE -->
<div id="title-slide">
  <div id="title-bg"></div>
  <div id="title-content">
    <div class="pre-title">Municipalidad de Rosario · Mapa interactivo</div>
    <h1>Jardines y Espacios Públicos</h1>
    <p>Explorá los jardines de infantes y espacios públicos de la ciudad de Rosario a través de este recorrido interactivo.</p>
    <button id="btn-start" disabled>
      <span id="loading-label">Cargando datos…</span>
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div id="loading-msg"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- PANEL IZQUIERDO -->
  <div id="panel">
    <div id="slide-hero">
      <img id="hero-img" src="" alt=""/>
      <div class="hero-num" id="hero-num">01</div>
      <div class="hero-caption" id="hero-caption"></div>
    </div>
    <div id="slide-body"></div>
    <div id="nav-bar">
      <button class="nav-arrow" id="btnPrev" aria-label="Anterior">&#10094;</button>
      <div id="nav-counter"><strong id="nav-cur">1</strong> / <span id="nav-tot">1</span></div>
      <button class="nav-arrow" id="btnNext" aria-label="Siguiente">&#10095;</button>
    </div>
  </div>

  <!-- MAPA -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="timeline"></div>
  </div>
</div>

<script>
const DATA_URL="https://ws.rosario.gob.ar/ubicaciones/public/geojson/lugaresConEtiquetas?termino=all&extendido=true&incluyeEtiquetas=false&habilitaBusquedaPorId=false&titular=0&etiquetas=jardines,p%C3%BAblicos&operadorEtiquetas=AND";

// EPSG:22185
proj4.defs("EPSG:22185","+proj=tmerc +lat_0=-90 +lon_0=-60 +k=1 +x_0=5500000 +y_0=0 +ellps=intl +towgs84=-148,136,90,0,0,0,0 +units=m +no_defs");
function toLatLon(x,y){const[lon,lat]=proj4("EPSG:22185","WGS84",[x,y]);return[lat,lon];}

function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const PHOTOS=[
  "https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1509062522246-3755977927d7?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1562774053-701939374585?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1564981797816-1043664bf78d?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1567168544230-f4c9ce2df6a8?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1544717305-2782549b5136?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1519452575417-564c1401ecc0?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1535982330050-f1c2fb79ff78?w=800&h=480&fit=crop&auto=format",
  "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&h=480&fit=crop&auto=format",
];
function photoUrl(props,i){
  const keys=['foto','fotos','imagen','imagenes','imagenUrl','imagen_url','foto_url','image','images','photo','photos'];
  for(const k of keys){
    if(!props[k])continue;
    let v=props[k];
    if(Array.isArray(v))v=v[0];
    if(typeof v==='object'&&v)v=v.url||v.src||null;
    if(typeof v==='string'&&v.trim()){
      return/^https?:\/\//i.test(v)?v:('https://ws.rosario.gob.ar'+v);
    }
  }
  return PHOTOS[i%PHOTOS.length];
}
function buildFields(props){
  const skip=new Set(['nombre','NOMBRE','titulo','name','NAME','descripcion','DESCRIPCION','direccion','DIRECCION']);
  let h='';
  for(const k in props){
    if(skip.has(k))continue;
    const v=props[k];
    if(v==null||v===''||typeof v==='object')continue;
    const label=k.replace(/_/g,' ').replace(/^\w/,c=>c.toUpperCase());
    let val=esc(v);
    if(/^https?:\/\//i.test(String(v)))val=`<a href="${val}" target="_blank" rel="noopener">${val}</a>`;
    h+=`<div class="s-field"><div class="s-field-label">${esc(label)}</div><div class="s-field-value">${val}</div></div>`;
  }
  return h;
}

// Leaflet
const map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([-32.9468,-60.6393],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap contributors &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

// Pin icons
function pin(color){
  return L.divIcon({
    html:`<svg viewBox="0 0 28 38" width="28" height="38" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0C6.3 0 0 6.3 0 14c0 9.6 14 24 14 24S28 23.6 28 14C28 6.3 21.7 0 14 0z" fill="${color}" stroke="rgba(0,0,0,.25)" stroke-width="1"/>
      <circle cx="14" cy="14" r="5.5" fill="rgba(255,255,255,.9)"/>
    </svg>`,
    className:'',iconSize:[28,38],iconAnchor:[14,38],popupAnchor:[0,-34]
  });
}
const iconDef=pin('#1d70b8');
const iconAct=pin('#d4351c');

// StoryMap extension
L.StoryMap=L.Evented.extend({
  initialize(m,o){
    this._map=m;this._slides=[];this._markers=[];this._current=-1;
    this._opts=Object.assign({zoom:17,flyDuration:1.2},o);
  },
  setSlides(slides){
    this._slides=slides;
    this._markers=slides.map((s,i)=>{
      const mk=L.marker(s.latlng,{icon:iconDef}).addTo(this._map);
      mk.on('click',()=>this.goTo(i));
      mk.bindTooltip(String(i+1),{permanent:false,direction:'top'});
      return mk;
    });
    if(slides.length>1){
      L.polyline(slides.map(s=>s.latlng),{color:'#1d70b8',weight:2,dashArray:'5,7',opacity:.5}).addTo(this._map);
    }
  },
  goTo(index){
    if(index<0||index>=this._slides.length)return;
    const prev=this._current;
    if(prev>=0)this._markers[prev].setIcon(iconDef);
    this._current=index;
    this._markers[index].setIcon(iconAct);
    const latlng=L.latLng(this._slides[index].latlng);
    const zoom=this._opts.zoom;
    // offset on mobile: panel is 54vh, move center down by 27vh
    let target=latlng;
    if(window.innerWidth<=768){
      const offsetPx=window.innerHeight*0.27;
      const pt=this._map.project(latlng,zoom);
      target=this._map.unproject(L.point(pt.x,pt.y+offsetPx),zoom);
    }
    this._map.flyTo(target,zoom,{duration:this._opts.flyDuration});
    this.fire('change',{index,prev,slide:this._slides[index]});
  },
  next(){this.goTo(this._current+1);},
  prev(){this.goTo(this._current-1);},
  current(){return this._current;},
  count(){return this._slides.length;}
});
L.storyMap=(m,o)=>new L.StoryMap(m,o);
const story=L.storyMap(map,{});

// DOM refs
const panel=document.getElementById('panel');
const heroImg=document.getElementById('hero-img');
const heroNum=document.getElementById('hero-num');
const heroCaption=document.getElementById('hero-caption');
const slideBody=document.getElementById('slide-body');
const navCur=document.getElementById('nav-cur');
const navTot=document.getElementById('nav-tot');
const btnPrev=document.getElementById('btnPrev');
const btnNext=document.getElementById('btnNext');
const timeline=document.getElementById('timeline');
let _lastIdx=-1;
let _dots=[];

function renderSlide(index,slide,dir){
  const p=slide.props;
  const nombre=p.nombre||p.NOMBRE||p.titulo||p.name||p.NAME||'Sin nombre';
  const direccion=p.direccion||p.DIRECCION||'';
  const descripcion=p.descripcion||p.DESCRIPCION||'';
  const url=photoUrl(p,index);
  const isReal=!!findRealPhoto(p);

  // hero
  heroImg.style.opacity='0';
  heroImg.onload=()=>{heroImg.style.opacity='1';};
  heroImg.src=url;
  heroNum.textContent=String(index+1).padStart(2,'0');
  heroCaption.textContent=isReal?'':(url?'Imagen de ejemplo (ilustrativa)':'');

  // body
  let inner=`
    <div class="s-label">Parada ${index+1} de ${story.count()}</div>
    <h2 class="s-title">${esc(nombre)}</h2>
    <span class="s-tag">Espacio público · Jardín</span>
  `;
  if(direccion)inner+=`<div class="s-field"><div class="s-field-label">Dirección</div><div class="s-field-value">${esc(direccion)}</div></div>`;
  if(descripcion)inner+=`<div class="s-field"><div class="s-field-label">Descripción</div><div class="s-field-value">${esc(descripcion)}</div></div>`;
  inner+=buildFields(p);

  const cls=dir==='next'?'from-right':dir==='prev'?'from-left':'';
  slideBody.innerHTML=`<div class="slide-inner ${cls}">${inner}</div>`;
  slideBody.scrollTop=0;

  navCur.textContent=String(index+1);
  btnPrev.disabled=(index===0);
  btnNext.disabled=(index===story.count()-1);

  // timeline dots
  _dots.forEach((d,i)=>{
    d.classList.toggle('active',i===index);
  });
  // scroll active dot into view
  const activeDot=_dots[index];
  if(activeDot)activeDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});

  // mobile: open panel, suppressing the map click that follows marker click
  if(window.innerWidth <= 768){
    _suppressClose = true;
    panel.classList.add('open');
    setTimeout(() => { _suppressClose = false; }, 300);
  }
}

// needed to check real photo separately
function findRealPhoto(props){
  const keys=['foto','fotos','imagen','imagenes','imagenUrl','imagen_url','foto_url','image','images','photo','photos'];
  for(const k of keys){
    if(!props[k])continue;
    let v=props[k];
    if(Array.isArray(v))v=v[0];
    if(typeof v==='object'&&v)v=v.url||v.src||null;
    if(typeof v==='string'&&v.trim())return v;
  }
  return null;
}

story.on('change',(e)=>{
  const dir=e.prev<0?'':e.index>e.prev?'next':'prev';
  renderSlide(e.index,e.slide,dir);
});

btnPrev.addEventListener('click',(e)=>{e.stopPropagation();_suppressClose=true;story.prev();setTimeout(()=>{_suppressClose=false;},300);});
btnNext.addEventListener('click',(e)=>{e.stopPropagation();_suppressClose=true;story.next();setTimeout(()=>{_suppressClose=false;},300);});
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight')story.next();
  else if(e.key==='ArrowLeft')story.prev();
});
// close panel on mobile when clicking map (but not right after opening it)
let _suppressClose = false;
map.on('click', () => {
  if(window.innerWidth <= 768 && !_suppressClose)
    panel.classList.remove('open');
});

// build timeline dots
function buildTimeline(count){
  timeline.innerHTML='';
  _dots=[];
  for(let i=0;i<count;i++){
    if(i>0){const l=document.createElement('div');l.className='tl-line';timeline.appendChild(l);}
    const d=document.createElement('div');
    d.className='tl-dot';
    d.title='Parada '+(i+1);
    d.addEventListener('click',()=>story.goTo(i));
    timeline.appendChild(d);
    _dots.push(d);
  }
}

// fetch
async function fetchWithFallback(url){
  const t=[];
  for(const proxy of ['',
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
  ]){
    try{
      const u=proxy?proxy+encodeURIComponent(url):url;
      const r=await fetch(u);
      if(r.ok)return await r.json();
      t.push(proxy+'→HTTP'+r.status);
    }catch(e){t.push(String(e.message));}
  }
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
    if(r.ok){const w=await r.json();if(w&&w.contents)return JSON.parse(w.contents);}
  }catch(e){t.push(String(e.message));}
  throw new Error(t.join(' | '));
}

async function init(){
  const loadingMsg=document.getElementById('loading-msg');
  try{
    const geo=await fetchWithFallback(DATA_URL);
    const features=geo.features||[];
    if(!features.length){loadingMsg.textContent='Sin resultados.';return;}

    const slides=[];
    features.forEach(f=>{
      if(!f.geometry||f.geometry.type!=='Point')return;
      const[x,y]=f.geometry.coordinates;
      let lat,lon;
      if(Math.abs(x)>180||Math.abs(y)>180)[lat,lon]=toLatLon(x,y);
      else{lon=x;lat=y;}
      slides.push({latlng:[lat,lon],props:f.properties||{}});
    });

    story.setSlides(slides);
    buildTimeline(slides.length);
    navTot.textContent=String(slides.length);
    map.fitBounds(slides.map(s=>s.latlng),{padding:[40,40]});

    // show app, hide title
    document.getElementById('app').classList.add('visible');
    const btnStart=document.getElementById('btn-start');
    btnStart.disabled=false;
    document.getElementById('loading-label').textContent='Comenzar recorrido';
    btnStart.addEventListener('click',()=>{
      document.getElementById('title-slide').classList.add('hidden');
      story.goTo(0);
    });

  }catch(err){
    loadingMsg.textContent='Error: '+err.message;
    console.error(err);
  }
}
init();
</script>
